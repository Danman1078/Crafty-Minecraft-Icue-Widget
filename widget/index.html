<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Minecraft Servers Widget</title>
<style>
  :root {
    --bg: #14181c;
    --panel: #1c2126;
    --border: #2a3138;
    --text: #e7e9ea;
    --text-dim: #8b959d;
    --online: #6bbf59;
    --online-glow: #6bbf5955;
    --offline: #c1554a;
    --offline-glow: #c1554a55;
    --accent: #e0a94a;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }

  body {
    font-family: var(--sans);
    color: var(--text);
  }

  /* Built for the Medium XENEON Edge slot: 840 x 696px -- two independent
     servers stacked, each getting roughly the same footprint the original
     single-server Small (840x344) design used. */
  .dual-card {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .server-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px 22px;
    gap: 6px;
    min-height: 0;
  }

  .panel-divider {
    height: 1px;
    background: var(--border);
    flex-shrink: 0;
    margin: 0 22px;
  }

  .top-grid {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 22px;
    flex: 1;
    min-height: 0;
  }

  .left-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }

  .right-col {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-height: 0;
    border-left: 1px solid var(--border);
    padding-left: 22px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .block-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    border-radius: 4px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 1px;
    padding: 2px;
    background: #000;
    transition: background 0.4s ease;
  }
  .block-icon span { border-radius: 1px; }
  .block-icon.online { background: #2f3a1f; box-shadow: 0 0 10px var(--online-glow); }
  .block-icon.online span:nth-child(odd) { background: var(--online); }
  .block-icon.online span:nth-child(even) { background: #4f8a3f; }
  .block-icon.offline { background: #3a2222; box-shadow: 0 0 10px var(--offline-glow); }
  .block-icon.offline span { background: #5c3a36; }
  .block-icon.offline span:nth-child(5) { background: var(--offline); }

  .server-name {
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-pill {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.6px;
    padding: 3px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    width: fit-content;
  }
  .status-pill.online { color: var(--online); background: #22301c; }
  .status-pill.offline { color: var(--offline); background: #302020; }

  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .uptime-text {
    font-size: 12px;
    color: var(--text-dim);
  }
  .updating-badge {
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 700;
    color: var(--accent);
    background: #2a2115;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .stat-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
  }
  .stat-line .label { color: var(--text-dim); }
  .stat-line .value { font-family: var(--mono); font-weight: 600; }
  .stat-line .value.big { font-size: 20px; }

  .update-badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: #2a2115;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
  }

  .sparkline { flex-shrink: 0; }
  .sparkline polyline { fill: none; stroke: var(--online); stroke-width: 1.5; }

  .motd {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .section-header .count {
    font-family: var(--mono);
    color: var(--accent);
    font-weight: 700;
    font-size: 12px;
  }

  .players-line {
    font-size: 12px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }
  .players-line b { color: var(--text); }

  .mod-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    overflow-y: auto;
    flex: 1;
    align-content: flex-start;
    min-height: 0;
  }
  .mod-chip {
    font-family: var(--mono);
    font-size: 10.5px;
    background: #12151a;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 2px 6px;
    border-radius: 5px;
    white-space: nowrap;
  }
  .mod-chip b { color: var(--text); font-weight: 600; }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
    padding-top: 6px;
  }

  .controls-row { display: flex; gap: 6px; }

  .power-btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 5px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: #12151a;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .power-btn:hover:not(:disabled) { background: #1a1f25; }
  .power-btn:disabled { opacity: 0.4; cursor: default; }
  .power-btn.start { border-color: var(--online); color: var(--online); }
  .power-btn.stop { border-color: var(--offline); color: var(--offline); }
  .power-btn.restart { border-color: var(--accent); color: var(--accent); }
  .power-btn.backup { border-color: #7aa8d1; color: #7aa8d1; }
  .power-btn.confirming { background: var(--offline); border-color: var(--offline); color: #fff; }

  .status-text {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.4;
  }
  .status-text .crafty-error { color: var(--offline); display: block; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="dual-card">
  <div class="server-panel" id="panel-0"></div>
  <div class="panel-divider"></div>
  <div class="server-panel" id="panel-1"></div>
</div>

<script>
  const RELAY_URL = "http://127.0.0.1:8787/mc-stats";
  const ACTION_URL = "http://127.0.0.1:8787/mc-action";
  const POLL_MS = 10000;

  // Per-panel UI state, keyed by server index (0/1) -- each panel is fully
  // independent since both servers can be live at once.
  const panelState = {
    0: { clientPendingAction: null, prevPlayerNames: null, confirmingAction: null, confirmTimeout: null, lastMc: null },
    1: { clientPendingAction: null, prevPlayerNames: null, confirmingAction: null, confirmTimeout: null, lastMc: null },
  };

  function panelTemplate(idx) {
    return `
      <div class="top-grid">
        <div class="left-col">
          <div class="header">
            <div id="blockIcon-${idx}" class="block-icon offline">
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
            </div>
            <div class="server-name" id="serverName-${idx}">Minecraft Server</div>
          </div>
          <div class="status-row">
            <div id="statusPill-${idx}" class="status-pill offline">Offline</div>
            <span class="uptime-text" id="uptimeText-${idx}"></span>
            <span class="updating-badge" id="updatingBadge-${idx}" style="display:none;">Updating…</span>
          </div>

          <div class="stat-line">
            <span class="label">Players</span>
            <svg class="sparkline" id="sparkline-${idx}" width="70" height="18" viewBox="0 0 70 18"></svg>
            <span class="value big" id="playersValue-${idx}">--</span>
          </div>
          <div class="stat-line">
            <span class="label">Version</span>
            <span class="value" id="versionValue-${idx}">--</span>
            <span class="update-badge" id="updateBadge-${idx}" style="display:none;"></span>
            <span class="value" id="latencyValue-${idx}" style="margin-left:6px;">--</span>
          </div>
          <div class="stat-line" id="cpuMemRow-${idx}" style="display:none;">
            <span class="label">CPU / RAM / World</span>
            <span class="value" id="cpuMemValue-${idx}">--</span>
          </div>

          <div class="motd" id="motdLine-${idx}">&nbsp;</div>
        </div>

        <div class="right-col">
          <div class="players-line" id="playersLine-${idx}">&nbsp;</div>
          <div class="section-header">
            <span id="modLoaderLabel-${idx}">Mods</span>
            <span class="count" id="modCount-${idx}">0</span>
          </div>
          <div class="mod-list" id="modList-${idx}"></div>
        </div>
      </div>

      <div class="bottom-bar">
        <div class="controls-row" id="controlsRow-${idx}" style="display:none;">
          <button id="startBtn-${idx}" class="power-btn start">Start</button>
          <button id="stopBtn-${idx}" class="power-btn stop">Stop</button>
          <button id="restartBtn-${idx}" class="power-btn restart">Restart</button>
          <button id="backupBtn-${idx}" class="power-btn backup">Backup</button>
        </div>
        <div class="status-text">
          <span id="lastUpdated-${idx}">never updated</span> <span id="lastSeen-${idx}"></span>
          <span id="idleNudge-${idx}"></span>
          <span id="lastBackup-${idx}"></span>
          <span class="crafty-error" id="craftyError-${idx}"></span>
        </div>
      </div>
    `;
  }

  function formatDuration(secs) {
    secs = Math.max(0, Math.floor(secs));
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    if (h > 0) return h + "h " + m + "m";
    if (m > 0) return m + "m";
    return secs + "s";
  }

  function timeAgo(ts) {
    if (!ts) return "never";
    const secs = Math.max(0, Math.floor(Date.now() / 1000 - ts));
    if (secs < 60) return secs + "s ago";
    if (secs < 3600) return Math.floor(secs / 60) + "m ago";
    return Math.floor(secs / 3600) + "h ago";
  }

  function el(idx, id) {
    return document.getElementById(id + "-" + idx);
  }

  function render(idx, mc) {
    const st = panelState[idx];
    st.lastMc = mc;
    const online = !!mc.online;

    el(idx, "blockIcon").className = "block-icon " + (online ? "online" : "offline");
    const pill = el(idx, "statusPill");
    pill.textContent = online ? "Online" : "Offline";
    pill.className = "status-pill " + (online ? "online" : "offline");

    el(idx, "uptimeText").textContent =
      online && mc.started_at ? "Up " + formatDuration(Date.now() / 1000 - mc.started_at) : "";
    el(idx, "updatingBadge").style.display = mc.crafty_updating ? "inline-block" : "none";

    el(idx, "serverName").textContent = mc.name || (mc.host + ":" + mc.port);

    el(idx, "playersValue").textContent =
      online && mc.players_online != null ? mc.players_online + "/" + mc.players_max : "--";
    el(idx, "versionValue").textContent = online && mc.version ? mc.version : "--";
    el(idx, "latencyValue").textContent =
      online && mc.latency_ms != null ? Math.round(mc.latency_ms) + "ms" : "--";

    el(idx, "motdLine").textContent = online && mc.motd ? mc.motd : (mc.error || "\u00A0");

    const names = mc.player_names || [];
    const playersLineEl = el(idx, "playersLine");
    playersLineEl.innerHTML = online && names.length ? "<b>Online:</b> " + names.join(", ") : "&nbsp;";

    const updateBadge = el(idx, "updateBadge");
    if (mc.update_available) {
      updateBadge.style.display = "inline";
      updateBadge.textContent = "\u2191 " + mc.mc_latest_release;
    } else {
      updateBadge.style.display = "none";
    }

    const cpuMemRow = el(idx, "cpuMemRow");
    if (mc.crafty_enabled && (mc.crafty_cpu_percent != null || mc.crafty_mem || mc.world_size)) {
      cpuMemRow.style.display = "flex";
      const cpu = mc.crafty_cpu_percent != null ? Math.round(mc.crafty_cpu_percent) + "%" : "--";
      const mem = mc.crafty_mem ? mc.crafty_mem + (mc.crafty_mem_percent ? " (" + mc.crafty_mem_percent + "%)" : "") : "--";
      const world = mc.world_size || "--";
      el(idx, "cpuMemValue").textContent = cpu + " / " + mem + " / " + world;
    } else {
      cpuMemRow.style.display = "none";
    }

    const mods = mc.mod_list || [];
    const loaderLabel = mc.mod_loader === "forge" ? "Forge Mods" : (mc.mod_loader === "vanilla" ? "Vanilla" : "Mods");
    el(idx, "modLoaderLabel").textContent = loaderLabel;
    el(idx, "modCount").textContent = mc.mod_count != null ? mc.mod_count : "0";

    const modListEl = el(idx, "modList");
    modListEl.innerHTML = "";
    mods.forEach(m => {
      const chip = document.createElement("span");
      chip.className = "mod-chip";
      chip.innerHTML = "<b>" + m.id + "</b>" + (m.version ? " " + m.version : "");
      modListEl.appendChild(chip);
    });
    if (mc.mod_list_truncated) {
      const more = document.createElement("span");
      more.className = "mod-chip";
      more.textContent = "+more (truncated)";
      modListEl.appendChild(more);
    }

    const history = mc.player_history || [];
    const sparkEl = el(idx, "sparkline");
    if (history.length > 1) {
      const maxVal = Math.max(1, ...history);
      const w = 70, h = 18, pad = 2;
      const points = history.map((v, i) => {
        const x = (i / (history.length - 1)) * w;
        const y = h - pad - (v / maxVal) * (h - pad * 2);
        return x.toFixed(1) + "," + y.toFixed(1);
      }).join(" ");
      sparkEl.innerHTML = '<polyline points="' + points + '"></polyline>';
      sparkEl.style.display = "inline-block";
    } else {
      sparkEl.style.display = "none";
    }

    el(idx, "idleNudge").textContent =
      mc.crafty_running && mc.empty_since
        ? "\u00b7 empty " + formatDuration(Date.now() / 1000 - mc.empty_since)
        : "";

    const tail = mc.console_tail || [];
    // no dedicated console line in this compact layout -- fold the latest
    // line into the motd slot only when there's no motd/error to show instead
    if (!mc.motd && !mc.error && tail.length) {
      el(idx, "motdLine").textContent = tail[tail.length - 1];
    }

    el(idx, "lastUpdated").textContent = "updated " + timeAgo(mc.updated_at);
    el(idx, "lastSeen").textContent =
      online ? "" : (mc.last_online_at ? "\u00b7 last seen " + timeAgo(mc.last_online_at) : "");
    el(idx, "lastBackup").textContent =
      mc.last_backup_triggered_at ? "\u00b7 backup " + timeAgo(mc.last_backup_triggered_at) : "";
    el(idx, "craftyError").textContent = mc.crafty_error || "";

    const controlsRow = el(idx, "controlsRow");
    const startBtn = el(idx, "startBtn");
    const stopBtn = el(idx, "stopBtn");
    const restartBtn = el(idx, "restartBtn");
    const backupBtn = el(idx, "backupBtn");

    if (!mc.crafty_enabled) {
      controlsRow.style.display = "none";
      return;
    }
    controlsRow.style.display = "flex";
    const pending = mc.crafty_action_pending || st.clientPendingAction;
    const running = !!mc.crafty_running;
    const starting = !!mc.crafty_starting;

    startBtn.disabled = !!pending || running || starting;
    stopBtn.disabled = !!pending || (!running && !starting);
    restartBtn.disabled = !!pending || (!running && !starting);
    backupBtn.disabled = !!pending || !running;

    startBtn.textContent = pending === "start" ? "Starting…" : "Start";
    backupBtn.textContent = pending === "backup" ? "Backing up…" : "Backup";

    if (pending === "stop") {
      stopBtn.textContent = "Stopping…"; stopBtn.className = "power-btn stop";
    } else if (st.confirmingAction === "stop") {
      stopBtn.textContent = "Confirm?"; stopBtn.className = "power-btn confirming";
    } else {
      stopBtn.textContent = "Stop"; stopBtn.className = "power-btn stop";
    }

    if (pending === "restart") {
      restartBtn.textContent = "Restarting…"; restartBtn.className = "power-btn restart";
    } else if (st.confirmingAction === "restart") {
      restartBtn.textContent = "Confirm?"; restartBtn.className = "power-btn confirming";
    } else {
      restartBtn.textContent = "Restart"; restartBtn.className = "power-btn restart";
    }

    if (mc.crafty_action_pending === null && st.clientPendingAction) {
      st.clientPendingAction = null;
    }
  }

  function renderUnreachable(idx) {
    el(idx, "blockIcon").className = "block-icon offline";
    const pill = el(idx, "statusPill");
    pill.textContent = "Relay Down";
    pill.className = "status-pill offline";
    el(idx, "motdLine").textContent = "Can't reach relay at 127.0.0.1:8787";
  }

  function confirmableSendAction(idx, serverName, action) {
    const st = panelState[idx];
    if (st.confirmingAction === action) {
      clearTimeout(st.confirmTimeout);
      st.confirmingAction = null;
      sendAction(idx, serverName, action);
    } else {
      st.confirmingAction = action;
      clearTimeout(st.confirmTimeout);
      st.confirmTimeout = setTimeout(() => {
        st.confirmingAction = null;
        if (st.lastMc) render(idx, st.lastMc);
      }, 4000);
      if (st.lastMc) render(idx, st.lastMc);
    }
  }

  async function sendAction(idx, serverName, action) {
    panelState[idx].clientPendingAction = action;
    try {
      await fetch(ACTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action, server: serverName }),
      });
    } catch (err) {
      panelState[idx].clientPendingAction = null;
    }
    poll();
  }

  function wireButtons(idx, serverName) {
    el(idx, "startBtn").onclick = () => sendAction(idx, serverName, "start");
    el(idx, "stopBtn").onclick = () => confirmableSendAction(idx, serverName, "stop");
    el(idx, "restartBtn").onclick = () => confirmableSendAction(idx, serverName, "restart");
    el(idx, "backupBtn").onclick = () => sendAction(idx, serverName, "backup");
  }

  let panelsBuilt = false;

  async function poll() {
    try {
      const res = await fetch(RELAY_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("bad response");
      const servers = await res.json();

      if (!panelsBuilt) {
        servers.forEach((mc, idx) => {
          const panel = document.getElementById("panel-" + idx);
          if (panel) {
            panel.innerHTML = panelTemplate(idx);
            wireButtons(idx, mc.name);
          }
        });
        panelsBuilt = true;
      }

      servers.forEach((mc, idx) => render(idx, mc));
    } catch (err) {
      renderUnreachable(0);
      renderUnreachable(1);
    }
  }

  poll();
  setInterval(poll, POLL_MS);
</script>

</body>
</html>
